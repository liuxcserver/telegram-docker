version: '3.8'

services:
  telegram-docker:
    image: ghcr.io/liuxcserver/telegram-docker:master
    container_name: telegram-docker
    restart: always
    ports:
      - "46080:6080"   # noVNC Web 访问端口
    environment:
      # 在这里设置 VNC 密码，不设置则默认为 123456
      - VNC_PASSWORD=123456
      # 设置时区，避免日志时间不对
      - TZ=Asia/Shanghai
    volumes:
      # 1. 持久化 Telegram 应用数据 (聊天记录、登录信息)
      - ./data/telegram-config:/root/.local/share/TelegramDesktop
      
      # 2. 挂载下载目录 (方便在宿主机直接查看下载的文件)
      - ./data/downloads:/root/Downloads
      
      # 3. (可选) 持久化 VNC 密码配置
      - ./data/vnc-config:/root/.vnc
    # 增加共享内存大小，防止浏览器或桌面渲染异常
    shm_size: '2gb'
    network_mode: bridge