services:
  telegram:
    # 指定镜像地址
    image: "ghcr.io/liuxcserver/telegram-docker:latest"
    # 容器名称
    container_name: telegram-docker
    # 网络模式设置为 bridge
    network_mode: bridge

    # 环境变量配置
    # 1. VNC_PASSWORD: 设置 VNC 连接密码
    environment:
      - VNC_PASSWD=123456  # 默认密码，可修改

    # 端口映射
    ports:
      - "46080:6080"

    # 数据卷挂载
    # 1. Wine 数据目录: 持久化 Telegram 的登录状态和聊天记录
    # 2. 下载目录: 共享文件夹，方便在主机和容器间传输文件
    volumes:
      - ./telegram/config:/root/.local/share/TelegramDesktop  # 登录信息
      - ./telegram/data:/root/Telegram\ Desktop                # 下载文件
    # 重启策略：除非手动停止，否则总是重启（保证服务常驻）
    restart: unless-stopped
    tmpfs:
      - /tmp

