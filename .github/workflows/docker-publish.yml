name: Docker Build & Push
on:
  push:
    branches:
      - master
      - release
    tags:
      - 'v*'
  workflow_dispatch:

# --- 新增：关键权限配置 ---
permissions:
  contents: read
  packages: write # 允许推送镜像

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛑 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 现在它有写入权了

      # 👇 新增：只登录 DockerHub，不影响原有逻辑
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Generate Tags
        id: meta
        run: |
          # ==============================================
          # 你原来的所有标签逻辑 完全不变！
          # ==============================================
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/telegram-docker"
          TAGS=""
          if [[ "${{ github.ref_type }}" == "branch" ]]; then
            TAGS="${GHCR_IMAGE}:${{ github.ref_name }}"
          fi
          if [[ "${{ github.ref_name }}" == "release" ]]; then
            TAGS="${TAGS},${GHCR_IMAGE}:latest"
          fi
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${GHCR_IMAGE}:${{ github.ref_name }}"
          fi
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="${TAGS},${GHCR_IMAGE}:sha-${SHORT_SHA}"
          TAGS=$(echo "$TAGS" | sed 's/^,//')
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

          # ==============================================
          # 👇 新增：只额外添加 latest 到 DockerHub
          # ==============================================
          if [[ "${{ github.ref_name }}" == "release" ]]; then
            DH_LATEST="${{ secrets.DOCKERHUB_USERNAME }}/telegram-docker:latest"
            TAGS="${TAGS},${DH_LATEST}"
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}